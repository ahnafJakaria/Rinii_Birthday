<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আপনার জন্য একটি বিশেষ সারপ্রাইজ ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Hind Siliguri', sans-serif;
}

body {
    background: linear-gradient(135deg, #f8e1f4, #ffccf9, #c2e6ff, #9cecff);
    background-size: 400% 400%;
    animation: gradientBackground 12s ease infinite;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 10;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 3s forwards 0.5s;
}

header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
}

h1 {
    font-size: 2.8rem;
    color: #6a4c93;
    margin-bottom: 15px;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 15px rgba(255, 107, 107, 0.5);
    animation: glowText 2s ease-in-out infinite;
}

@keyframes glowText {
    0%, 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
    50% { text-shadow: 0 0 20px rgba(255, 107, 107, 0.8), 0 0 25px rgba(161, 140, 209, 0.8); }
}

.letter-container {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 0 20px rgba(106, 76, 147, 0.3), 0 0 30px rgba(255, 215, 232, 0.5);
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
    background-clip: padding-box;
}

.letter-container::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, #ff6b8a, #f48fb1, #b28cff);
    z-index: -1;
    animation: gradientBorder 5s ease infinite;
}

.letter {
    font-size: 1.2rem;
    line-height: 1.8;
    color: #333;
    position: relative;
    z-index: 2;
    min-height: 250px;
    font-family: 'Hind Siliguri', sans-serif;
}

.letter .signature {
    text-align: right;
    margin-top: 25px;
    font-size: 1.1rem;
    color: #6a4c93;
    font-style: italic;
    font-weight: bold;
}

.button-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin: 30px 0;
    position: relative;
}

.surprise-button {
    background: linear-gradient(45deg, #ff6b8a, #f48fb1, #b28cff);
    background-size: 300% 300%;
    animation: gradientButton 5s ease infinite;
    color: white;
    font-size: 1.5rem;
    font-weight: bold;
    padding: 15px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(161, 140, 209, 0.5), 0 0 15px rgba(255, 107, 107, 0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    z-index: 2;
}

.surprise-button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(161, 140, 209, 0.7), 0 0 20px rgba(255, 107, 107, 0.5);
}

.back-button {
    background: linear-gradient(45deg, #ff6b8a, #f48fb1, #b28cff);
    background-size: 300% 300%;
    animation: gradientButton 5s ease infinite;
    color: white;
    font-size: 1.3rem;
    font-weight: bold;
    padding: 12px 30px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(161, 140, 209, 0.5), 0 0 15px rgba(255, 107, 107, 0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    z-index: 2;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
}

.back-button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(161, 140, 209, 0.7), 0 0 20px rgba(255, 107, 107, 0.5);
}

.button-particle {
    position: absolute;
    background: rgba(255, 107, 107, 0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: floatParticle 2s ease-out forwards;
}

@keyframes floatParticle {
    0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
    100% { transform: translateY(-50px) scale(0.5); opacity: 0; }
}

.music-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: linear-gradient(45deg, #ff6b8a, #b28cff);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 15px rgba(106, 76, 147, 0.3), 0 0 20px rgba(255, 107, 107, 0.3);
    cursor: pointer;
    transition: all 0.3s ease;
}

.music-controls:hover {
    transform: scale(1.15);
    box-shadow: 0 0 25px rgba(106, 76, 147, 0.5), 0 0 30px rgba(255, 107, 107, 0.5);
}

.music-controls i {
    color: white;
    font-size: 24px;
}

.floating-element {
    position: absolute;
    pointer-events: none;
    opacity: 0.6;
    z-index: 1;
    animation: float 5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 5px rgba(255, 107, 107, 0.3));
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes gradientBackground {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes gradientButton {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes gradientBorder {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes float {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-20px) rotate(5deg); }
}

.cursor-effect {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(45deg, #ff6b8a, #b28cff);
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, -50%);
    transition: opacity 0.5s ease;
    opacity: 0;
    box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
}

@media (max-width: 768px) {
    h1 { font-size: 2rem; }
    .container { padding: 15px; }
    .letter-container { padding: 20px; }
    .letter { font-size: 1rem; }
    .surprise-button, .back-button { font-size: 1.2rem; padding: 12px 25px; }
    .floating-element { max-width: 35px; max-height: 35px; }
}

@media (max-width: 480px) {
    h1 { font-size: 1.6rem; }
    .letter { font-size: 0.95rem; line-height: 1.6; }
    .surprise-button, .back-button { font-size: 1rem; padding: 10px 20px; }
    .letter-container { padding: 15px; }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
<header>
    <h1>❤️ Dear Birthday Girl Rini ❤️</h1>
</header>

<div class="letter-container">
    <div class="letter" id="typed-text"></div>
</div>

<div class="button-container">
    <button class="surprise-button" id="surprise-button">
        🎁 সারপ্রাইজের জন্য ক্লিক করুন!
    </button>
    <a href="cake.html" class="back-button">
        <i class="fas fa-heart"></i> জন্মদিনের কেকে ফিরে যান
    </a>
</div>
</div>

<!-- Happy Birthday Music - rini.mp3 -->
<audio id="background-music" loop>
    <source src="rini.mp3" type="audio/mpeg">
</audio>

<audio id="click-sound" preload="auto">
    <source src="rini.mp3" type="audio/mpeg">
</audio>

<!-- Music Controls -->
<div class="music-controls" id="music-toggle">
    <i class="fas fa-volume-up" id="music-icon"></i>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Music Control - rini.mp3
    const bgMusic = document.getElementById('background-music');
    const musicToggle = document.getElementById('music-toggle');
    const musicIcon = document.getElementById('music-icon');
    let isMusicPlaying = false;

    setTimeout(() => {
        bgMusic.play().then(() => {
            isMusicPlaying = true;
            musicIcon.className = 'fas fa-volume-up';
        }).catch(() => {});
    }, 1500);

    musicToggle.addEventListener('click', function() {
        if (isMusicPlaying) {
            bgMusic.pause();
            musicIcon.className = 'fas fa-volume-mute';
        } else {
            bgMusic.play();
            musicIcon.className = 'fas fa-volume-up';
        }
        isMusicPlaying = !isMusicPlaying;
    });

    setTimeout(() => {
        document.querySelector('.container').style.opacity = 1;
    }, 500);

    const letterContent = `শুভ জন্মদিন, রিনি! 🎉🌸

আজকের দিনটা আপনার জীবনে অফুরন্ত আনন্দ, হাসি আর সুন্দর স্মৃতিতে ভরে উঠুক—এই কামনাই করি। আল্লাহর কাছে দোয়া করি, আপনার জীবনে এমন অসংখ্য জন্মদিন আসুক, প্রতিটা আগের চেয়ে আরও বেশি সুন্দর আর সফল হোক।

আপনি সত্যিই খুব ভালো মনের একজন মানুষ। হয়তো আমাদের এখনো সামনাসামনি দেখা হয়নি, তবুও আপনার সঙ্গে কথা বললে এক ধরনের ভালো লাগা কাজ করে। কিছু মানুষ দূরে থেকেও অদ্ভুতভাবে আপন হয়ে যায়—আপনি ঠিক তেমনই একজন।

জীবন সব সময় একরকম থাকে না। সুখ-দুঃখ, উত্থান-পতন থাকবেই। কিন্তু আমি মন থেকে চাই, প্রতিটি কঠিন সময়ের পর আপনার জীবনে আরও বেশি আলো, শান্তি আর হাসি ফিরে আসুক। আপনার মুখের হাসিটা যেন কখনো ম্লান না হয়।

আশা করি, ভবিষ্যতে আরও অনেক সুন্দর মুহূর্ত আর কথোপকথনের সাক্ষী হব।

আবারও জন্মদিনের অনেক অনেক শুভেচ্ছা। ভালো থাকবেন।

আর হ্যাঁ... এখন পড়তে বসেন! 😊📚`;
    
    new Typed('#typed-text', {
        strings: [letterContent],
        typeSpeed: 28,
        showCursor: true,
        cursorChar: '✍️',
        onComplete: function() {
            const letterDiv = document.getElementById('typed-text');
            const signature = document.createElement('div');
            signature.className = 'signature';
            signature.innerHTML = '💝 শুভ জন্মদিন রিনি! -আহনাফ';
            letterDiv.appendChild(signature);
            
            setTimeout(() => {
                document.querySelector('.surprise-button').style.animation = 'pulse 1.5s infinite';
            }, 500);
        }
    });

    // Floating elements
    const floatingElements = [
        { type: 'heart', color: '#ff6b8a', size: '20px' },
        { type: 'heart', color: '#f48fb1', size: '30px' },
        { type: 'star', color: '#ffd54f', size: '25px' },
        { type: 'star', color: '#ffecb3', size: '15px' },
        { type: 'teddy', emoji: '🧸', size: '30px' },
        { type: 'sparkle', emoji: '✨', size: '25px' },
        { type: 'sparkle', emoji: '✨', size: '20px' },
        { type: 'heart', color: '#ff6b8a', size: '25px' },
        { type: 'star', color: '#ffd54f', size: '20px' },
        { type: 'teddy', emoji: '🧸', size: '25px' }
    ];

    floatingElements.forEach((element) => {
        createFloatingElement(element);
    });

    document.addEventListener('mousemove', createCursorEffect);

    const surpriseButton = document.getElementById('surprise-button');
    const backButton = document.querySelector('.back-button');
    const clickSound = document.getElementById('click-sound');

    surpriseButton.addEventListener('click', function() {
        clickSound.play();
        setTimeout(() => {
            window.location.href = 'gallery.html';
        }, 400);
    });

    backButton.addEventListener('click', function() {
        clickSound.play();
    });

    [surpriseButton, backButton].forEach(button => {
        button.addEventListener('mouseover', function(e) {
            for (let i = 0; i < 5; i++) {
                createButtonParticle(e);
            }
        });
    });

    function createFloatingElement(element) {
        const floatingElement = document.createElement('div');
        floatingElement.classList.add('floating-element');
        
        if (element.emoji) {
            floatingElement.textContent = element.emoji;
            floatingElement.style.fontSize = element.size;
        } else if (element.type === 'heart') {
            floatingElement.innerHTML = '<i class="fas fa-heart"></i>';
            floatingElement.style.color = element.color;
            floatingElement.style.fontSize = element.size;
        } else if (element.type === 'star') {
            floatingElement.innerHTML = '<i class="fas fa-star"></i>';
            floatingElement.style.color = element.color;
            floatingElement.style.fontSize = element.size;
        }
        
        const randomX = Math.random() * window.innerWidth;
        const randomY = Math.random() * window.innerHeight;
        floatingElement.style.left = `${randomX}px`;
        floatingElement.style.top = `${randomY}px`;
        
        const duration = 5 + Math.random() * 5;
        const delay = Math.random() * 3;
        floatingElement.style.animationDuration = `${duration}s`;
        floatingElement.style.animationDelay = `${delay}s`;
        
        document.body.appendChild(floatingElement);
    }

    function createCursorEffect(e) {
        const cursorEffect = document.createElement('div');
        cursorEffect.classList.add('cursor-effect');
        cursorEffect.style.left = `${e.pageX}px`;
        cursorEffect.style.top = `${e.pageY}px`;
        document.body.appendChild(cursorEffect);
        
        setTimeout(() => {
            cursorEffect.style.opacity = 1;
            cursorEffect.style.transform = `translate(-50%, -50%) scale(${Math.random() * 0.5 + 0.5})`;
            
            setTimeout(() => {
                cursorEffect.style.opacity = 0;
                setTimeout(() => {
                    cursorEffect.remove();
                }, 500);
            }, 300);
        }, 10);
    }

    function createButtonParticle(e) {
        const particle = document.createElement('div');
        particle.classList.add('button-particle');
        particle.style.left = `${e.offsetX}px`;
        particle.style.top = `${e.offsetY}px`;
        particle.style.width = `${Math.random() * 5 + 3}px`;
        particle.style.height = particle.style.width;
        e.target.appendChild(particle);
        
        setTimeout(() => {
            particle.remove();
        }, 2000);
    }
});
</script>
</body>
</html>
