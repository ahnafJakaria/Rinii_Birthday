<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Lane - Rini's Birthday</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffcee6 0%, #ffd6f1 50%, #e4f9ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .confetti {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd1f9;
            top: -20px;
            opacity: 0;
        }

        .scrapbook-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ff9eda' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.7;
            z-index: -1;
        }

        .memory-lane-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: float 3s ease-in-out infinite;
        }

        .header h1 {
            font-size: 3.5rem;
            color: #ff4e91;
            margin-bottom: 1rem;
            font-family: 'Pacifico', cursive;
            text-shadow: 3px 3px 0px rgba(255, 165, 213, 0.5);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .header p {
            font-size: 1.2rem;
            color: #8858a3;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.6);
            padding: 1.2rem 1.8rem;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .gallery-container {
            position: relative;
            margin: 2rem 0;
        }

        .slideshow-controls {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s forwards 1s;
        }

        .btn {
            padding: 0.8rem 1.8rem;
            margin: 0 0.5rem;
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 110, 196, 0.4);
        }

        .btn:hover {
            background: linear-gradient(45deg, #7873f5, #ff6ec4);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 110, 196, 0.6);
        }

        .gallery {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 1.8rem;
            padding: 1.5rem 0.5rem;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #ff6ec4 #ffcee6;
        }

        .gallery::-webkit-scrollbar {
            height: 8px;
        }

        .gallery::-webkit-scrollbar-track {
            background: #ffcee6;
            border-radius: 10px;
        }

        .gallery::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            border-radius: 10px;
        }

        .memory-card {
            flex: 0 0 auto;
            width: 320px;
            height: 420px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(255, 105, 180, 0.3);
            transform: translateY(50px) rotate(var(--rotate, 0deg));
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 8px solid white;
        }

        .memory-card.visible {
            transform: translateY(0) rotate(var(--rotate, 0deg));
            opacity: 1;
        }

        .memory-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .memory-card:hover .memory-img {
            transform: scale(1.1);
        }

        .memory-caption {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(255, 105, 180, 0.9);
            color: white;
            padding: 1.2rem 1.5rem;
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            text-align: center;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        .memory-card:hover .memory-caption {
            bottom: 0;
        }

        .memory-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .memory-card:hover::before {
            opacity: 1;
        }

        .card-tape {
            position: absolute;
            width: 110px;
            height: 35px;
            background: rgba(255, 255, 255, 0.85);
            top: -12px;
            left: 50%;
            transform: translateX(-50%) rotate(var(--rotate, 2deg));
            z-index: 2;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.15);
            border-radius: 2px;
        }

        .card-sticker {
            position: absolute;
            width: 45px;
            height: 45px;
            z-index: 3;
            bottom: 15px;
            right: 15px;
            transform: rotate(15deg);
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.2));
            animation: bounce 2.5s infinite;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            gap: 1rem;
        }

        #nextButton {
            background: linear-gradient(45deg, #ff4e91, #ff9a8b);
            font-size: 1.1rem;
            padding: 1rem 2.2rem;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        #nextButton::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        #nextButton:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 78, 145, 0.5);
        }

        #backButton {
            background: linear-gradient(45deg, #a485ff, #75c6ff);
        }

        .sticker {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 5;
            filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.2));
            pointer-events: none;
            animation: float 4s ease-in-out infinite;
        }

        .sticker1 { top: 8%; left: 3%; animation-delay: 0.2s; }
        .sticker2 { bottom: 12%; right: 3%; animation-delay: 0.6s; }
        .sticker3 { bottom: 25%; left: 5%; animation-delay: 1s; }
        .sticker4 { top: 15%; right: 5%; animation-delay: 1.4s; }

        .balloon {
            position: fixed;
            width: 60px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ff7eb9, #ff1493);
            border-radius: 50%;
            box-shadow: inset -5px -5px 0 rgba(0, 0, 0, 0.1);
            animation: floatUp 18s linear infinite;
            z-index: -1;
        }

        .balloon::before {
            content: "";
            position: absolute;
            width: 2px;
            height: 80px;
            background: rgba(0, 0, 0, 0.15);
            top: 100%;
            left: 50%;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1) rotate(15deg); }
            50% { transform: scale(1.2) rotate(20deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(255, 110, 196, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 10px 30px rgba(255, 110, 196, 0.6); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(255, 110, 196, 0.4); }
        }

        @keyframes shine {
            0% { left: -100%; opacity: 0; }
            20% { left: 100%; opacity: 0.5; }
            100% { left: 100%; opacity: 0; }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.05); }
            50% { transform: scale(1); }
            75% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes floatDown {
            0% { transform: translateY(-10px) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 110, 196, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-controls:hover {
            transform: scale(1.15);
            box-shadow: 0 0 25px rgba(255, 110, 196, 0.6);
        }

        .music-controls i {
            color: white;
            font-size: 24px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .memory-card { width: 260px; height: 350px; }
            .gallery { gap: 1.2rem; }
            .sticker { width: 45px; height: 45px; }
            .navigation-buttons { flex-wrap: wrap; justify-content: center; }
            .btn { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 2rem; }
            .header p { font-size: 1rem; padding: 1rem; }
            .memory-card { width: 220px; height: 300px; border-width: 5px; }
            .navigation-buttons { flex-direction: column; align-items: center; gap: 0.8rem; }
            #nextButton { order: 0; }
            #backButton { order: 1; }
            .btn { width: 100%; max-width: 220px; }
            .slideshow-controls .btn { font-size: 0.8rem; padding: 0.6rem 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="scrapbook-bg"></div>
    <div class="confetti" id="confetti-container"></div>
    
    <div class="balloon" style="left: 10%; animation-duration: 18s;"></div>
    <div class="balloon" style="left: 20%; animation-duration: 15s; animation-delay: 2s;"></div>
    <div class="balloon" style="left: 70%; animation-duration: 20s; animation-delay: 5s;"></div>
    <div class="balloon" style="left: 85%; animation-duration: 17s; animation-delay: 1s;"></div>
    <div class="balloon" style="left: 40%; animation-duration: 22s; animation-delay: 7s;"></div>
    
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ff6ec4' /%3E%3Ctext x='50' y='65' font-family='Arial' font-size='40' text-anchor='middle' fill='white'%3E✨%3C/text%3E%3C/svg%3E" class="sticker sticker1">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23a485ff' /%3E%3Ctext x='50' y='65' font-family='Arial' font-size='40' text-anchor='middle' fill='white'%3E♥%3C/text%3E%3C/svg%3E" class="sticker sticker2">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ff4e91' /%3E%3Ctext x='50' y='65' font-family='Arial' font-size='40' text-anchor='middle' fill='white'%3E★%3C/text%3E%3C/svg%3E" class="sticker sticker3">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23c175ff' d='M50 0 L75 25 L100 0 L75 50 L100 100 L50 75 L0 100 L25 50 L0 0 L25 25 Z' /%3E%3C/svg%3E" class="sticker sticker4">

    <!-- Happy Birthday Music - rini.mp3 -->
    <audio id="bg-music" loop>
        <source src="rini.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Controls -->
    <div class="music-controls" id="musicToggle">
        <i class="fas fa-volume-up" id="musicIcon"></i>
    </div>

    <div class="memory-lane-container">
        <div class="header">
            <h1>Rini's Memory Lane</h1>
            <p>🌸 A journey through the most beautiful moments. Maybe one day we'll share these memories together. Until then, every picture of you makes my heart smile. You are truly a beautiful soul. 💖</p>
        </div>

        <div class="slideshow-controls">
            <button id="startSlideshow" class="btn">▶ Start Slideshow</button>
            <button id="pauseSlideshow" class="btn" style="display: none;">⏸ Pause Slideshow</button>
        </div>

        <div class="gallery-container">
            <div class="gallery" id="memoryGallery"></div>
        </div>

        <div class="navigation-buttons">
            <button id="backButton" class="btn">← Back to Welcome</button>
            <button id="nextButton" class="btn">✨ Next Surprise! ✨</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Music Control - rini.mp3
        const bgMusic = document.getElementById('bg-music');
        const musicToggle = document.getElementById('musicToggle');
        const musicIcon = document.getElementById('musicIcon');
        let isMusicPlaying = false;

        setTimeout(() => {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicIcon.className = 'fas fa-volume-up';
            }).catch(() => {});
        }, 1500);

        musicToggle.addEventListener('click', function() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicIcon.className = 'fas fa-volume-mute';
            } else {
                bgMusic.play();
                musicIcon.className = 'fas fa-volume-up';
            }
            isMusicPlaying = !isMusicPlaying;
        });

        const memories = [
            { image: "pic1.jpg", caption: "🌸 The smile that brightens my day.", rotationAngle: -2, emoji: "🌸" },
            { image: "pic2.jpg", caption: "💖 A little beauty that never goes unnoticed.", rotationAngle: 3, emoji: "💖" },
            { image: "pic3.jpg", caption: "✨ Every picture tells a story I wish I were part of.", rotationAngle: -1, emoji: "✨" },
            { image: "pic4.jpg", caption: "🌷 You make ordinary moments look magical.", rotationAngle: 2, emoji: "🌷" },
            { image: "pic5.jpg", caption: "💕 Distance can't hide your beautiful smile.", rotationAngle: -3, emoji: "💕" },
            { image: "pic6.jpg", caption: "🌙 A moment worth remembering forever.", rotationAngle: 1, emoji: "🌙" },
            { image: "pic7.jpg", caption: "🌹 Simply beautiful, effortlessly.", rotationAngle: -2, emoji: "🌹" },
            { image: "pic8.jpg", caption: "☀️ Your happiness is contagious.", rotationAngle: 2, emoji: "☀️" },
            { image: "pic9.jpg", caption: "❤️ Hopefully one day this gallery will include our memories too..", rotationAngle: 3, emoji: "❤️" }
        ];

        function createConfetti() {
            const confettiContainer = document.getElementById('confetti-container');
            const colors = ['#ff6ec4', '#a485ff', '#ff4e91', '#c175ff', '#75c6ff'];
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.width = Math.random() * 12 + 4 + 'px';
                confetti.style.height = Math.random() * 12 + 4 + 'px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                const duration = Math.random() * 4 + 3;
                const delay = Math.random() * 5;
                confetti.style.animation = `floatDown ${duration}s ease-in ${delay}s infinite`;
                confetti.style.opacity = Math.random() * 0.8 + 0.2;
                confettiContainer.appendChild(confetti);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            createConfetti();
            
            const galleryElement = document.getElementById('memoryGallery');
            const startSlideshowBtn = document.getElementById('startSlideshow');
            const pauseSlideshowBtn = document.getElementById('pauseSlideshow');
            const backButton = document.getElementById('backButton');
            const nextButton = document.getElementById('nextButton');
            
            let slideshowInterval;
            let currentSlide = 0;

            memories.forEach((memory, index) => {
                const memoryCard = document.createElement('div');
                memoryCard.className = 'memory-card';
                memoryCard.style.setProperty('--rotate', `${memory.rotationAngle}deg`);
                
                const tapeElement = document.createElement('div');
                tapeElement.className = 'card-tape';
                tapeElement.style.setProperty('--rotate', `${memory.rotationAngle * 2}deg`);
                
                const imgElement = document.createElement('img');
                imgElement.className = 'memory-img';
                imgElement.src = memory.image;
                imgElement.alt = `Memory ${index + 1}`;
                
                const captionElement = document.createElement('div');
                captionElement.className = 'memory-caption';
                captionElement.textContent = memory.caption;
                
                const stickerElement = document.createElement('div');
                stickerElement.className = 'card-sticker';
                stickerElement.innerHTML = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="50" fill="#ff6ec4" />
                    <text x="50" y="65" font-family="Arial" font-size="40" text-anchor="middle" fill="white">${memory.emoji}</text>
                </svg>`;
                
                memoryCard.appendChild(tapeElement);
                memoryCard.appendChild(imgElement);
                memoryCard.appendChild(captionElement);
                memoryCard.appendChild(stickerElement);
                galleryElement.appendChild(memoryCard);
            });

            document.querySelector('.slideshow-controls').style.opacity = '1';

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.3 });

            document.querySelectorAll('.memory-card').forEach((card, index) => {
                observer.observe(card);
                setTimeout(() => {
                    card.classList.add('visible');
                }, 500 + (index * 150));
            });

            function startSlideshow() {
                startSlideshowBtn.style.display = 'none';
                pauseSlideshowBtn.style.display = 'flex';
                if (slideshowInterval) clearInterval(slideshowInterval);
                
                slideshowInterval = setInterval(() => {
                    currentSlide = (currentSlide + 1) % memories.length;
                    const cards = galleryElement.querySelectorAll('.memory-card');
                    if (cards && cards.length > 0 && cards[currentSlide]) {
                        const galleryRect = galleryElement.getBoundingClientRect();
                        const cardRect = cards[currentSlide].getBoundingClientRect();
                        galleryElement.scrollTo({
                            left: cards[currentSlide].offsetLeft - (galleryRect.width / 2) + (cardRect.width / 2),
                            behavior: 'smooth'
                        });
                    }
                }, 2500);
            }

            function pauseSlideshow() {
                pauseSlideshowBtn.style.display = 'none';
                startSlideshowBtn.style.display = 'flex';
                if (slideshowInterval) {
                    clearInterval(slideshowInterval);
                    slideshowInterval = null;
                }
            }

            startSlideshowBtn.addEventListener('click', startSlideshow);
            pauseSlideshowBtn.addEventListener('click', pauseSlideshow);

            backButton.addEventListener('click', function() {
                window.location.href = 'index.html';
            });

            nextButton.addEventListener('click', function() {
                window.location.href = 'cake.html';
            });

            gsap.from('.header', {
                duration: 1,
                y: -50,
                opacity: 0,
                ease: 'back.out(1.7)'
            });

            gsap.from('.navigation-buttons', {
                duration: 1,
                y: 50,
                opacity: 0,
                delay: 0.5,
                ease: 'power3.out'
            });

            gsap.utils.toArray('.sticker').forEach(sticker => {
                gsap.to(sticker, {
                    rotation: 'random(-20, 20)',
                    duration: 'random(2, 4)',
                    repeat: -1,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            });

            document.querySelectorAll('.memory-card').forEach(card => {
                card.addEventListener('mouseenter', function() {
                    gsap.to(this, {
                        scale: 1.05,
                        boxShadow: '0 15px 35px rgba(255, 105, 180, 0.5)',
                        duration: 0.3
                    });
                });
                card.addEventListener('mouseleave', function() {
                    gsap.to(this, {
                        scale: 1,
                        boxShadow: '0 12px 30px rgba(255, 105, 180, 0.3)',
                        duration: 0.3
                    });
                });
            });

            setTimeout(() => {
                const galleryContainer = document.querySelector('.gallery-container');
                galleryContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 1500);
        });
    </script>
</body>
</html>
